{% if jobs %}
<div class="text-xs font-bold dark:font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-4">
  {{ jobs|length }} job{{ 's' if jobs|length != 1 else '' }} found
</div>
<div class="flex flex-col gap-4">
  {% for job in jobs %}
    {% include "partials/job_card.html" %}
  {% endfor %}
</div>
{% else %}
<div class="text-center py-16">
  <p class="text-slate-400 dark:text-slate-500 text-sm">No jobs found. Try changing the filters or run Scout to fetch new listings.</p>
</div>
{% endif %}
