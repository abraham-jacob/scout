{% if jobs %}
<div class="text-sm text-slate-500 mb-4">{{ jobs|length }} job{{ 's' if jobs|length != 1 else '' }} found</div>
<div class="flex flex-col gap-3">
  {% for job in jobs %}
    {% include "partials/job_card.html" %}
  {% endfor %}
</div>
{% else %}
<div class="text-center py-16">
  <p class="text-slate-400 text-sm">No jobs found. Try changing the filters or run Scout to fetch new listings.</p>
</div>
{% endif %}
