site_name: Scout
site_description: An AI agent that scrapes, cleans, classifies, and scores your LinkedIn job alerts
site_url: https://abraham-jacob.github.io/scout/
repo_url: https://github.com/abraham-jacob/scout
repo_name: abraham-jacob/scout
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Using the Web UI: web-ui.md
  - Configuration: configuration.md
  - Local LLM Backend: local-llm.md
  - Architecture: architecture.md
  - Contributing: contributing.md
  - FAQ / Troubleshooting: faq.md
